<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Plagiarism Checker</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.container{
  width:820px;
  background:rgba(255,255,255,0.06);
  padding:42px;
  border-radius:22px;
  backdrop-filter:blur(12px);
}

h1{text-align:center;margin-bottom:8px;font-size:34px;}
.sub{text-align:center;opacity:0.7;margin-bottom:28px;font-size:14px;}

.tabs{display:flex;gap:14px;margin-bottom:25px;}

.tab{
  flex:1;
  padding:14px;
  text-align:center;
  border-radius:12px;
  cursor:pointer;
  background:rgba(255,255,255,0.08);
}

.tab.active{
  background:#84cc16;
  color:black;
  font-weight:bold;
}

.box{
  background:#111827;
  padding:20px;
  border-radius:14px;
  margin-bottom:16px;
}

input[type="file"]{
  width:100%;
  padding:10px;
  border-radius:10px;
  background:#0f172a;
  color:white;
}

button{
  width:100%;
  padding:14px;
  margin-top:14px;
  border:none;
  border-radius:12px;
  background:#84cc16;
  font-weight:bold;
  cursor:pointer;
}

.list{
  margin-top:14px;
}

.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.06);
  padding:10px 12px;
  border-radius:10px;
  margin-top:10px;
}

.remove{
  background:#ef4444;
  border:none;
  color:white;
  padding:2px 6px;
  border-radius:4px;
  cursor:pointer;
  font-size:10px;
  width:auto;
}

/* RESULT CLEAN */
.result{
  margin-top:25px;
  background:#0f172a;
  padding:22px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,0.08);
}

.score{
  font-size:48px;
  font-weight:bold;
  color:#84cc16;
  text-align:center;
}

.section{
  margin-top:20px;
}

.source{
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin-top:8px;
  background:rgba(255,255,255,0.05);
  border-radius:8px;
}

.download-btn{
  margin-top:18px;
  background:#3b82f6;
}
</style>
</head>

<body>

<div class="container">

<h1>Plagiarism Checker</h1>
<div class="sub">PDF vs PDFs OR PDF vs Internet</div>

<div class="tabs">
  <div class="tab active" onclick="setMode(1)">PDF vs PDFs</div>
  <div class="tab" onclick="setMode(2)">Internet Check</div>
</div>

<!-- MODE 1 -->
<div id="mode1">
  <div class="box">
    <label>Main PDF</label>
    <input type="file" id="mainPdf1">
  </div>

  <div class="box">
    <label>Comparison PDFs</label>
    <input type="file" id="cmpInput">
    <div class="list" id="cmpList"></div>
  </div>

  <button onclick="runMode1()">Check Plagiarism</button>
</div>

<!-- MODE 2 -->
<div id="mode2" style="display:none">
  <div class="box">
    <label>Main PDF</label>
    <input type="file" id="mainPdf2">
  </div>

  <button onclick="runMode2()">Check Internet Plagiarism</button>
</div>

<div class="result" id="out" style="display:none"></div>

</div>

<script>

let mode=1;
let cmpFiles=[];
let lastReport=null;

function setMode(m){
  mode=m;
  document.getElementById("mode1").style.display=m===1?"block":"none";
  document.getElementById("mode2").style.display=m===2?"block":"none";
  document.getElementById("out").style.display="none";
}

document.getElementById("cmpInput").addEventListener("change",(e)=>{
  const f=e.target.files[0];
  if(!f) return;
  cmpFiles.push(f);
  renderList();
});

function renderList(){
  const list=document.getElementById("cmpList");
  list.innerHTML="";
  cmpFiles.forEach((f,i)=>{
    list.innerHTML+=`
      <div class="item">
        <span>${f.name}</span>
        <button class="remove" onclick="removePdf(${i})">x</button>
      </div>`;
  });
}

function removePdf(i){
  cmpFiles.splice(i,1);
  renderList();
}

function loader(t){
  document.getElementById("out").style.display="block";
  document.getElementById("out").innerHTML=`
    <div style="text-align:center;padding:20px;">${t}</div>
  `;
}

async function runMode1(){
  const main=document.getElementById("mainPdf1").files[0];
  if(!main||cmpFiles.length===0) return alert("Upload files");

  loader("Analysing...");

  const form=new FormData();
  form.append("pdf1",main);
  cmpFiles.forEach(f=>form.append("pdfs",f));

  const res=await fetch("/api/plagiarism/compare",{method:"POST",body:form});
  const data=await res.json();

  lastReport=data;
  show(data);
}

async function runMode2(){
  const file=document.getElementById("mainPdf2").files[0];
  if(!file) return alert("Upload PDF");

  loader("Checking Internet...");

  const form=new FormData();
  form.append("pdf1",file);

  const res=await fetch("/api/plagiarism/internet-check",{method:"POST",body:form});
  const data=await res.json();

  lastReport=data;
  show(data);
}

function downloadReport(){
  if(!lastReport) return alert("No report");

  fetch("/api/plagiarism/report", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(lastReport)
  })
  .then(res => res.blob())
  .then(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "plagiarism-report.pdf";
    a.click();
    URL.revokeObjectURL(url);
  })
  .catch(err => {
    console.error(err);
    alert("PDF generation failed");
  });
}

function show(data){

  let html=`
    <div class="score">${data.percentage}%</div>
    <div style="text-align:center;margin-top:10px;">
      ${data.mainFile}
    </div>
  `;

  if(data.results){
    html+=`<div class="section"><h3>PDF Matches</h3>`;
    data.results.forEach(r=>{
      html+=`
        <div class="source">
          <span>${r.fileName}</span>
          <b>${r.similarity}%</b>
        </div>`;
    });
    html+=`</div>`;
  }

  if(data.sources){
    html+=`<div class="section"><h3>Internet Sources</h3>`;
    data.sources.forEach(s=>{
      html+=`
        <div class="source">
          <a href="${s.source}" target="_blank" style="color:#93c5fd">
            ${s.source}
          </a>
          <b>${s.similarity}%</b>
        </div>`;
    });
    html+=`</div>`;
  }

  html+=`<button class="download-btn" onclick="downloadReport()">Download Report</button>`;

  document.getElementById("out").innerHTML=html;
}
</script>

</body>
</html>
